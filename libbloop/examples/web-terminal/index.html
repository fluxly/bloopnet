<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bloopnet terminal</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="terminal">
      <header class="terminal-header">
        <span class="logo">bloopnet</span>
        <span class="tagline">like twitter. only better because it is worse.</span>
      </header>

      <div class="input-section">
        <span class="prompt">›</span>
        <textarea
          id="input"
          rows="4"
          placeholder="write a bloop..."
          autocomplete="off"
          spellcheck="false"
        ></textarea>
        <div class="char-bar">
          <span id="char-count">0</span>
          <span class="char-limit">/ 64 symbols</span>
          <span id="size-badge" class="size-badge"></span>
        </div>
      </div>

      <div id="output" class="output" aria-live="polite"></div>

      <section class="audio-panel" aria-label="sound controls">
        <div class="audio-row audio-row--top">
          <button id="enableAudio" class="audio-btn">enable audio</button>
          <label class="audio-toggle">
            <input type="checkbox" id="playWhileTyping" />
            play while typing
          </label>
        </div>
        <div class="audio-row audio-row--sliders">
          <label class="slider-label">
            <span class="slider-name">vol</span>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.25" />
            <span id="volumeValue" class="slider-val">0.25</span>
          </label>
          <label class="slider-label">
            <span class="slider-name">rate</span>
            <input type="range" id="rateSlider" min="0.25" max="4" step="0.25" value="1" />
            <span id="rateValue" class="slider-val">1×</span>
          </label>
        </div>
        <!-- bloop-audio-vm is registered by main.ts; no visible UI of its own -->
        <bloop-audio-vm id="audio" volume="0.25" preview></bloop-audio-vm>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
